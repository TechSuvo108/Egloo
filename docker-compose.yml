version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: egloo
      POSTGRES_PASSWORD: egloo
      POSTGRES_DB: egloo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - chroma
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  beat:
    build: .
    command: celery -A app.workers.celery_app:celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app

volumes:
  postgres_data:
  chroma_data:
